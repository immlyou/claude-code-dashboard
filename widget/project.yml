name: ClaudeDashboardWidget
options:
  bundleIdPrefix: com.imchris.claude-dashboard
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ClaudeDashboardWidgetHost:
    type: application
    platform: macOS
    sources:
      - path: HostApp/Sources
      - path: ClaudeDashboardWidget/Sources/WidgetData.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imchris.claude-dashboard.widget-host
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Claude Dashboard Widget"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        MARKETING_VERSION: "2.3.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: false
    entitlements:
      path: HostApp/HostApp.entitlements
    dependencies:
      - target: ClaudeDashboardWidgetExtension

  ClaudeDashboardWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ClaudeDashboardWidget/Sources
    info:
      path: ClaudeDashboardWidget/Info.plist
      properties:
        CFBundleName: "Claude Dashboard Widget"
        CFBundleDisplayName: "Claude Dashboard Widget"
        CFBundleShortVersionString: "2.3.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imchris.claude-dashboard.widget-host.widget
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: false
    entitlements:
      path: ClaudeDashboardWidget/ClaudeDashboardWidget.entitlements
